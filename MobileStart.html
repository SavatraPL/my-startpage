<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~/startpage</title>
    <style>
        /* 1. THEME COLORS & FONTS */
        :root {
            --bg: #1b1b24;        
            --fg: #d2d7f3;        
            --accent: #e67e22;    
            --lavender: #b69cdb;  
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-mono);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ensures bg covers full screen on mobile */
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            gap: 60px;
            align-items: center;
        }

        /* 2. THE IMAGE CARD */
        .image-container img {
            width: 280px;
            aspect-ratio: 9 / 16; 
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            filter: contrast(1.1) brightness(1.1); 
        }

        /* 3. THE CONTENT SIDE */
        .content {
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: var(--accent); 
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .clock {
            color: var(--lavender); 
            font-size: 1.2rem;
            margin-bottom: 40px;
            letter-spacing: 0px;
        }

        /* 4. THE LINKS GRID */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .category h3 {
            color: var(--lavender);
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            text-transform: lowercase;
        }
