<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~/startpage</title>
    <style>
        :root {
            --bg: #1b1b24;        
            --fg: #d2d7f3;        
            --accent: #e67e22;    
            --lavender: #b69cdb;  
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-mono);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            gap: 60px;
            align-items: center;
        }

        .image-container img {
            width: 280px;
            aspect-ratio: 9 / 16; 
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            filter: contrast(1.1) brightness(1.1); 
        }

        .content {
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: var(--accent); 
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .clock {
            color: var(--lavender); 
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .category h3 {
            color: var(--lavender);
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            text-transform: lowercase;
        }

        .category ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .category li {
            margin-bottom: 5px;
        }

        .category a {
            color: var(--fg);
            text-decoration: none;
            transition: color 0.2s;
        }

        .category a:hover {
            color: var(--accent); 
        }

        /* MOBILE LAYOUT */
        @media (max-width: 800px) {
            .container {
                flex-direction: column;
                gap: 30px;
                text-align: center;
            }
            .image-container img {
                width: 220px;
            }
            .links-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-container">
            <img src="./birddd.png" alt="Pijus Bird Startpage">
        </div>

        <div class="content">
            <h1>Welcome back!</h1>
            <div class="clock" id="clock">00:00:00 | 00/00/0000</div>

            <div class="links-grid">
                <div class="category">
                    <h3>~/general</h3>
                    <ul>
                        <li><a href="https://youtube.com">YouTube</a></li>
                        <li><a href="https://reddit.com">Reddit</a></li>
                        <li><a href="https://pinterest.com">Pinterest</a></li>
                    </ul>
                </div>
                
                <div class="category">
                    <h3>~/school</h3>
                    <ul>
                        <li><a href="https://tamo.lt">Tamo Dienynas</a></li>
                        <li><a href="https://office.com">office365</a></li>
                    </ul>
                </div>
                
                <div class="category">
                    <h3>~/util</h3>
                    <ul>
                        <li><a href="https://spotidownloader.com">spotidownloader</a></li>
                        <li><a href="https://virustotal.com">VirusTotal</a></li>
                        <li><a href="https://proton.me/mail">Proton Mail</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour12: false });
            const day = now.getDate();
            const month = now.getMonth() + 1;
            const year = now.getFullYear();
            const date = `${day}/${month}/${year}`;
            document.getElementById('clock').innerHTML = `${time} | ${date}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
